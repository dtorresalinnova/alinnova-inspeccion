function supaFetch(endpoint, method, body) {
  var opts = {
    method: method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Prefer': 'return=minimal'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPA_URL + '/rest/v1/' + endpoint, opts);
}

function insertarRegistros(rows) {
  return supaFetch('registros', 'POST', rows);

    ]},
    {id:'proceso', nombre:'Zona de Proceso', preguntas:[
      {t:'Limpieza y desinfeccion general', tipo:'c'},
      {t:'Maquinas y utensilios sin danos?', tipo:'c'}
    ]},
    {id:'flowpack', nombre:'Cuarto Flowpack', preguntas:[
      {t:'Temperatura del cuarto', tipo:'n'},
      {t:'Que producto se esta empacando?', tipo:'e', ops:['Pandebono','Ponque vainilla','Pan blandito','Muffin queso','Pan calentano','Pan maiz','Hojaldre bocadillo','Croissant de queso','Croissant sin relleno']},
      {t:'Esta correctamente rotulado?', tipo:'c'}
    ]},
    {id:'ptseco', nombre:'PT Seco', preguntas:[
      {t:'Hay productos sin rotular?', tipo:'c'},
      {t:'Hay productos vencidos?', tipo:'c'}
    ]},
    {id:'ptrefri', nombre:'PT Refrigerado', preguntas:[
      {t:'Hay productos sin rotular?', tipo:'c'},
      {t:'Hay productos vencidos?', tipo:'c'}
    ]}
  ]}
];

/* ---- ICONOS ---- */
var IARR = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4.5l4.5 4.5L7 13.5" stroke="#B4B2A9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var ICHECK = '<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="11" fill="#9FE1CB"/><path d="M7 11l3 3 5-5" stroke="#085041" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var IPEND = '<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke="#B4B2A9" stroke-width="1.5"/><path d="M11 6v5l3 3" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/></svg>';
var IEMPTY = '<svg width="52" height="52" viewBox="0 0 52 52" fill="none" style="margin:0 auto;display:block"><rect x="8" y="12" width="36" height="32" rx="5" stroke="#B4B2A9" stroke-width="2"/><path d="M18 24h16M18 32h10" stroke="#B4B2A9" stroke-width="2" stroke-linecap="round"/></svg>';

function icoLinea(id, c) {
  var s = '';
  if (id === 'g') s = '<path d="M12 4C9 4 6 6.5 6 9.5c0 2 1 3.5 3 4.5V18h6v-4c2-1 3-2.5 3-4.5C18 6.5 15 4 12 4z" stroke="' + c + '" stroke-width="1.6" fill="none"/><rect x="9" y="18" width="6" height="3" rx="1" fill="' + c + '"/>';
  if (id === 'e') s = '<rect x="3" y="6" width="18" height="13" rx="2.5" stroke="' + c + '" stroke-width="1.6"/><path d="M7 11h10M7 15h6" stroke="' + c + '" stroke-width="1.6" stroke-linecap="round"/>';
  if (id === 'p') s = '<path d="M5 15c0-5 3.5-9 7-9s7 4 7 9" stroke="' + c + '" stroke-width="1.6" stroke-linecap="round"/><rect x="4" y="15" width="16" height="6" rx="2" stroke="' + c + '" stroke-width="1.6"/>';
  return '<svg width="26" height="26" viewBox="0 0 24 24" fill="none">' + s + '</svg>';
}

/* ---- ESTADO ---- */
var ST = { fecha: '', analista: '', linea: '', zona: '', resp: {} };
var TV = {};

/* ---- HELPERS ---- */
function getLinea(id) {
  for (var i = 0; i < LINEAS.length; i++) { if (LINEAS[i].id === id) return LINEAS[i]; }
  return null;
}
function getZona(lid, zid) {
  var l = getLinea(lid);
  if (!l) return null;
  for (var i = 0; i < l.zonas.length; i++) { if (l.zonas[i].id === zid) return l.zonas[i]; }
  return null;
}
function contarResp(lid, zid) {
  if (!ST.resp[lid] || !ST.resp[lid][zid]) return 0;
  return Object.keys(ST.resp[lid][zid]).length;
}
function zonaCompleta(lid, z) {
  return contarResp(lid, z.id) >= z.preguntas.length;
}
function ensureResp() {
  if (!ST.resp[ST.linea]) ST.resp[ST.linea] = {};
  if (!ST.resp[ST.linea][ST.zona]) ST.resp[ST.linea][ST.zona] = {};
}

/* ---- NAVEGACION ---- */
function showS(id) {
  var ss = document.querySelectorAll('.screen');
  for (var i = 0; i < ss.length; i++) ss[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function irInicio() { showS('s-inicio'); }
function irZonas() {
  document.getElementById('z-tit').textContent = getLinea(ST.linea).nombre;
  renderZonas();
  showS('s-zonas');
}
function irDash() { renderDash(); showS('s-dash'); }

/* ---- INICIO ---- */
var ANALISTAS = ['Angela','Felipe','Fabian','David','Juan Camilo','Daniel','Giorgio'];
function selA(nombre) {
  ST.analista = nombre;
  for (var i = 0; i < ANALISTAS.length; i++) {
    var id = 'btn-' + ANALISTAS[i].replace(' ','');
    var el = document.getElementById(id);
    if (el) el.classList.remove('sel');
  }
  var selId = 'btn-' + nombre.replace(' ','');
  var selEl = document.getElementById(selId);
  if (selEl) selEl.classList.add('sel');
}

function renderLineas() {
  var h = '';
  for (var i = 0; i < LINEAS.length; i++) {
    var l = LINEAS[i];
    h += '<button class="lbtn" onclick="abrirLinea(\'' + l.id + '\')">' +
      '<div class="lico" style="background:' + l.color + '">' + icoLinea(l.id, l.ci) + '</div>' +
      '<div style="flex:1;min-width:0"><div class="lname">' + l.nombre + '</div><div class="lsub">' + l.zonas.length + ' zonas de inspeccion</div></div>' +
      IARR + '</button>';
  }
  document.getElementById('lineas-list').innerHTML = h;
}

function abrirLinea(id) {
  if (!ST.fecha) { toast('Selecciona la fecha primero'); return; }
  if (!ST.analista) { toast('Selecciona el analista'); return; }
  ST.linea = id;
  if (!ST.resp[id]) ST.resp[id] = {};
  irZonas();
}

/* ---- ZONAS ---- */
function renderZonas() {
  var l = getLinea(ST.linea);
  var comp = 0;
  for (var i = 0; i < l.zonas.length; i++) { if (zonaCompleta(ST.linea, l.zonas[i])) comp++; }
  var pct = Math.round(comp / l.zonas.length * 100);
  document.getElementById('z-pfill').style.width = pct + '%';
  document.getElementById('z-ppct').textContent = pct + '%';
  document.getElementById('z-sub').textContent = ST.analista + ' - ' + ST.fecha;
  document.getElementById('z-plbl').textContent = comp + ' de ' + l.zonas.length + ' zonas';
  var h = '';
  for (var i = 0; i < l.zonas.length; i++) {
    var z = l.zonas[i];
    var done = zonaCompleta(ST.linea, z);
    var cnt = contarResp(ST.linea, z.id);
    h += '<button class="zbtn' + (done ? ' done' : '') + '" onclick="abrirZona(\'' + z.id + '\')">' +
      '<div class="zdot">' + (done ? ICHECK : IPEND) + '</div>' +
      '<div style="flex:1;min-width:0"><div class="zname">' + z.nombre + '</div>' +
      '<div class="zcount">' + z.preguntas.length + ' preguntas - ' + (done ? 'Completada' : cnt + ' respondidas') + '</div></div>' +
      IARR + '</button>';
  }
  document.getElementById('zonas-list').innerHTML = h;
  document.getElementById('btn-fin').disabled = (comp < l.zonas.length);
}

function abrirZona(zid) {
  ST.zona = zid;
  TV = {};
  var z = getZona(ST.linea, zid);
  document.getElementById('p-tit').textContent = z.nombre;
  document.getElementById('p-sub').textContent = getLinea(ST.linea).nombre + ' - ' + ST.analista;
  renderPregs();
  showS('s-pregs');
}

/* ---- PREGUNTAS ---- */
function renderPregs() {
  var z = getZona(ST.linea, ST.zona);
  var rv = (ST.resp[ST.linea] && ST.resp[ST.linea][ST.zona]) ? ST.resp[ST.linea][ST.zona] : {};
  var h = '';
  for (var i = 0; i < z.preguntas.length; i++) {
    var p = z.preguntas[i];
    var v = rv[i];
    h += '<div class="pcard"><div class="pnum">Pregunta ' + (i + 1) + ' de ' + z.preguntas.length + '</div><div class="ptxt">' + p.t + '</div>';
    if (p.tipo === 'n') {
      var cur = (v !== undefined) ? v : 0;
      TV[i] = cur;
      h += '<div class="twrap' + (v !== undefined ? ' filled' : '') + '" id="tw' + i + '">' +
        '<button class="tbtn" onclick="chT(' + i + ',-1)">&#8722;</button>' +
        '<div class="tval" id="tv' + i + '">' + cur + '</div>' +
        '<div class="tunit">&#176;C</div>' +
        '<button class="tbtn" onclick="chT(' + i + ',1)">+</button></div>';
    } else if (p.tipo === 'e') {
      h += '<div style="display:flex;flex-direction:column;gap:8px">';
      for (var j = 0; j < p.ops.length; j++) {
        var op = p.ops[j];
        h += '<button class="rbtn en' + (v === op ? ' sel' : '') + '" onclick="setR(' + i + ',\'' + op + '\',this)">' + op + '</button>';
      }
      h += '</div>';
    } else {
      h += '<div class="rrow">' +
        '<button class="rbtn ok' + (v === 'Cumple' ? ' sel' : '') + '" onclick="setR(' + i + ',\'Cumple\',this)">Cumple</button>' +
        '<button class="rbtn nok' + (v === 'No cumple' ? ' sel' : '') + '" onclick="setR(' + i + ',\'No cumple\',this)">No cumple</button>' +
        '<button class="rbtn na' + (v === 'N/A' ? ' sel' : '') + '" onclick="setR(' + i + ',\'N/A\',this)" style="max-width:60px">N/A</button></div>';
    }
    h += '</div>';
  }
  document.getElementById('pregs-body').innerHTML = h;
}

function chT(i, d) {
  if (TV[i] === undefined) TV[i] = 0;
  TV[i] += d;
  document.getElementById('tv' + i).textContent = TV[i];
  document.getElementById('tw' + i).classList.add('filled');
  ensureResp();
  ST.resp[ST.linea][ST.zona][i] = TV[i];
}

function setR(i, val, btn) {
  ensureResp();
  ST.resp[ST.linea][ST.zona][i] = val;
  var parent = btn.parentNode;
  var bs = parent.querySelectorAll('.rbtn');
  for (var b = 0; b < bs.length; b++) bs[b].classList.remove('sel');
  btn.classList.add('sel');
}

function guardarZona() {
  var z = getZona(ST.linea, ST.zona);
  var cnt = contarResp(ST.linea, ST.zona);
  var falt = z.preguntas.length - cnt;
  if (falt > 0 && !confirm('Faltan ' + falt + ' respuesta(s). Guardar de todas formas?')) return;
  toast('Zona guardada');
  irZonas();
}

/* ---- FINALIZAR LINEA → SUPABASE ---- */
function finLinea() {
  var l = getLinea(ST.linea);
  var ts = new Date().toISOString();
  var rows = [];
  for (var i = 0; i < l.zonas.length; i++) {
    var z = l.zonas[i];
    var zr = (ST.resp[ST.linea] && ST.resp[ST.linea][z.id]) ? ST.resp[ST.linea][z.id] : {};
    for (var k = 0; k < z.preguntas.length; k++) {
      rows.push({
        fecha: ST.fecha,
        analista: ST.analista,
        linea: l.nombre,
        linea_id: l.id,
        zona: z.nombre,
        pregunta: z.preguntas[k].t,
        respuesta: zr[k] !== undefined ? String(zr[k]) : '',
        timestamp: ts
      });
    }
  }
  toast('Guardando...');
  insertarRegistros(rows).then(function(res) {
    if (res.ok || res.status === 201) {
      ST.resp[ST.linea] = {};
      toast('Linea "' + l.nombre + '" guardada en Supabase');
      irInicio();
    } else {
      res.text().then(function(t) { toast('Error al guardar: ' + t); });
    }
  }).catch(function(err) {
    toast('Error de conexion: ' + err.message);
  });
}

/* ---- DASHBOARD ---- */
function renderDash() {
  document.getElementById('tp-res').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando registros...</div>';
  document.getElementById('tp-reg').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';

  obtenerRegistros().then(function(res) {
    return res.json();
  }).then(function(data) {
    var R = data;
    if (!R || !R.length) {
      document.getElementById('tp-res').innerHTML = '<div class="empty">' + IEMPTY + '<div class="etxt">Sin registros aun.<br>Completa una ruta de inspeccion.</div></div>';
      document.getElementById('tp-reg').innerHTML = '<div class="empty">' + IEMPTY + '<div class="etxt">Sin historial aun.</div></div>';
      return;
    }

    var tOk = 0, tNok = 0, tP = 0, lc = {}, analistas = {};
    for (var i = 0; i < R.length; i++) {
      var r = R[i];
      if (r.respuesta === 'Cumple') { tOk++; tP++; }
      else if (r.respuesta === 'No cumple') { tNok++; tP++; }
      else if (r.respuesta) tP++;
      lc[r.linea] = (lc[r.linea] || 0) + 1;
      analistas[r.analista] = (analistas[r.analista] || 0) + 1;
    }
    var pct = tP > 0 ? Math.round(tOk / tP * 100) : 0;

    var lh = '';
    var lks = Object.keys(lc);
    for (var i = 0; i < lks.length; i++) {
      lh += '<div style="display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #F1EFE8"><span style="font-size:14px;color:#2C2C2A">' + lks[i] + '</span><span style="font-size:14px;font-weight:600;color:#085041">' + lc[lks[i]] + ' registros</span></div>';
    }

    document.getElementById('tp-res').innerHTML =
      '<div class="sgrid">' +
        '<div class="sbox"><div class="slb">Total filas</div><div class="sv">' + R.length + '</div></div>' +
        '<div class="sbox"><div class="slb">Cumplimiento</div><div class="sv g">' + pct + '%</div></div>' +
        '<div class="sbox"><div class="slb">Cumplen</div><div class="sv g">' + tOk + '</div></div>' +
        '<div class="sbox"><div class="slb">No cumplen</div><div class="sv r">' + tNok + '</div></div>' +
      '</div>' +
      '<div class="card" style="margin-top:0"><div class="slbl">Por linea</div>' + lh + '</div>';

    // Agrupar por timestamp para mostrar inspecciones
    var grupos = {};
    for (var i = 0; i < R.length; i++) {
      var r = R[i];
      var key = r.timestamp + '_' + r.analista + '_' + r.linea;
      if (!grupos[key]) grupos[key] = {fecha: r.fecha, analista: r.analista, linea: r.linea, ts: r.timestamp, ok: 0, nok: 0};
      if (r.respuesta === 'Cumple') grupos[key].ok++;
      if (r.respuesta === 'No cumple') grupos[key].nok++;
    }
    var gks = Object.keys(grupos);
    var rh = '';
    for (var i = gks.length - 1; i >= 0; i--) {
      var g = grupos[gks[i]];
      var hora = '';
      try { hora = new Date(g.ts).toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'}); } catch(e) {}
      rh += '<div class="rcard">' +
        '<div class="rtop"><div><div class="rfecha">' + g.fecha + ' - ' + g.analista + '</div><div class="rhora">' + hora + '</div></div>' +
        '<div class="rpill">' + g.linea + '</div></div>' +
        '<div class="rstats"><span class="rok">Cumplen: ' + g.ok + '</span><span class="rnok">No cumplen: ' + g.nok + '</span></div>' +
      '</div>';
    }
    document.getElementById('tp-reg').innerHTML = rh || '<div class="empty">' + IEMPTY + '<div class="etxt">Sin historial.</div></div>';

  }).catch(function(err) {
    document.getElementById('tp-res').innerHTML = '<div class="empty"><div class="etxt">Error al cargar datos.<br>' + err.message + '</div></div>';
  });

  document.getElementById('tp-exp').innerHTML =
    '<div class="card"><div class="slbl">Exportar datos</div>' +
    '<p style="font-size:14px;color:#5F5E5A;margin-bottom:16px;line-height:1.6">Descarga todos los registros de Supabase en formato CSV.</p>' +
    '<button class="bexp" onclick="exportCSV()">Descargar CSV</button></div>' +
    '<div class="tipbox">Los datos vienen en tiempo real desde Supabase. Cada linea del CSV es una respuesta individual.</div>';
}

function cambTab(t) {
  var tabs = ['res', 'reg', 'exp'];
  for (var i = 0; i < tabs.length; i++) {
    var on = tabs[i] === t;
    document.getElementById('tb-' + tabs[i]).classList[on ? 'add' : 'remove']('act');
    document.getElementById('tp-' + tabs[i]).classList[on ? 'add' : 'remove']('act');
  }
}

function exportCSV() {
  toast('Descargando datos...');
  obtenerRegistros().then(function(res) { return res.json(); }).then(function(R) {
    if (!R || !R.length) { toast('Sin registros para exportar'); return; }
    var rows = [['ID','Fecha','Analista','Linea','Zona','Pregunta','Respuesta','Timestamp']];
    for (var i = 0; i < R.length; i++) {
      var r = R[i];
      rows.push([r.id, r.fecha, r.analista, r.linea, r.zona, r.pregunta, r.respuesta, r.timestamp]);
    }
    var csv = '';
    for (var i = 0; i < rows.length; i++) {
      var row = '';
      for (var j = 0; j < rows[i].length; j++) {
        if (j > 0) row += ',';
        row += '"' + String(rows[i][j] || '').replace(/"/g, '""') + '"';
      }
      csv += row + '\n';
    }
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'}));
    a.download = 'alinnova_' + new Date().toISOString().split('T')[0] + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }).catch(function(err) { toast('Error: ' + err.message); });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

document.addEventListener('DOMContentLoaded', function() {
  var hoy = new Date();
  var mm = hoy.getMonth() + 1;
  var dd = hoy.getDate();
  var yyyy = hoy.getFullYear();
  var fechaStr = yyyy + '-' + (mm < 10 ? '0' : '') + mm + '-' + (dd < 10 ? '0' : '') + dd;
  var fi = document.getElementById('f-fecha');
  fi.value = fechaStr;
  ST.fecha = fechaStr;
  fi.addEventListener('change', function() { ST.fecha = fi.value; });
  renderLineas();
});
</script>
</body>
